<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>嘉豪大廈 · Home Guide</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a1628;
      --surface: #0f2040;
      --surface2: #162a50;
      --border: #1e3a5f;
      --text: #e8f4ff;
      --text-dim: #7ba3c8;
      --route-a: #FF5E5E;
      --route-b: #3EFFA8;
      --route-c: #A78BFA;
      --gold: #FFD166;
      --font: 'Space Mono', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

    #app {
      position: relative; width: 100%; height: 100%;
      max-width: 480px; margin: 0 auto; overflow: hidden;
    }

    #app::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(30,58,95,0.25) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,58,95,0.25) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none; z-index: 0;
    }

    .screen {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      padding: 24px 20px 32px; overflow-y: auto;
      opacity: 0; pointer-events: none; transition: opacity 0.25s ease; z-index: 1;
    }
    .screen.active { opacity: 1; pointer-events: all; }

    /* ── HEADER ── */
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-shrink: 0; }
    .logo { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; color: var(--text-dim); text-transform: uppercase; }

    .lang-toggle { display: flex; gap: 3px; }
    .lang-btn {
      background: none; border: 1px solid var(--border); color: var(--text-dim);
      font-family: var(--font); font-size: 10px; padding: 4px 7px; cursor: pointer; transition: all 0.15s;
    }
    .lang-btn.active { border-color: var(--text); color: var(--text); background: var(--surface2); }

    /* ── TYPOGRAPHY ── */
    .section-label {
      font-size: 10px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-dim); margin-bottom: 14px;
    }
    h2 { font-size: 26px; font-weight: 700; line-height: 1.15; margin-bottom: 6px; }
    .sub { font-size: 12px; color: var(--text-dim); line-height: 1.6; margin-bottom: 28px; }

    /* ── INPUT ── */
    .field input {
      width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text);
      font-family: var(--font); font-size: 16px; padding: 15px 16px; outline: none;
      transition: border-color 0.15s; letter-spacing: 0.08em; margin-bottom: 12px;
    }
    .field input:focus { border-color: var(--text-dim); }
    .field input.shake { border-color: var(--route-a); animation: shake 0.3s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); } 25% { transform: translateX(-7px); } 75% { transform: translateX(7px); }
    }

    /* ── BUTTONS ── */
    .btn {
      width: 100%; background: none; border: 2px solid var(--text); color: var(--text);
      font-family: var(--font); font-size: 12px; font-weight: 700; padding: 15px;
      cursor: pointer; letter-spacing: 0.18em; text-transform: uppercase; transition: all 0.18s;
      position: relative; overflow: hidden; margin-bottom: 10px;
    }
    .btn::before { content: ''; position: absolute; inset: 0; background: var(--text); transform: translateY(101%); transition: transform 0.18s ease; }
    .btn span { position: relative; z-index: 1; }
    .btn:hover::before { transform: translateY(0); }
    .btn:hover { color: var(--bg); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn.gold  { border-color: var(--gold);    color: var(--gold);    }
    .btn.gold::before  { background: var(--gold);    }
    .btn.gold:hover  { color: var(--bg); }

    .btn.green { border-color: var(--route-b); color: var(--route-b); }
    .btn.green::before { background: var(--route-b); }
    .btn.green:hover { color: var(--bg); }

    .back-btn {
      background: none; border: none; color: var(--text-dim); font-family: var(--font);
      font-size: 11px; cursor: pointer; padding: 0; letter-spacing: 0.1em;
      display: inline-flex; align-items: center; gap: 5px;
    }
    .back-btn:hover { color: var(--text); }

    /* ── ROUTE CARDS ── */
    .route-card {
      background: var(--surface); border: 1px solid var(--border);
      padding: 18px 18px 18px 22px; margin-bottom: 10px; cursor: pointer;
      transition: all 0.15s; position: relative; overflow: hidden;
    }
    .route-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
    .route-card.a::before { background: var(--route-a); }
    .route-card.b::before { background: var(--route-b); }
    .route-card.c::before { background: var(--route-c); }
    .route-card:hover { border-color: var(--text-dim); transform: translateX(3px); }

    .rc-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
    .rc-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.2em; }
    .rc-tag.a { color: var(--route-a); }
    .rc-tag.b { color: var(--route-b); }
    .rc-tag.c { color: var(--route-c); }
    .rc-time { font-size: 11px; color: var(--text-dim); }
    .rc-name { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
    .rc-desc { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
    .rc-badge {
      display: inline-block; background: var(--route-c); color: var(--bg);
      font-size: 9px; font-weight: 700; letter-spacing: 0.12em; padding: 3px 8px; margin-top: 8px;
    }

    /* ── STEPS ── */
    .progress-bar { width: 100%; height: 2px; background: var(--border); margin-bottom: 20px; flex-shrink: 0; }
    .progress-fill { height: 100%; transition: width 0.35s ease; }
    .progress-fill.a { background: var(--route-a); }
    .progress-fill.b { background: var(--route-b); }
    .progress-fill.c { background: var(--route-c); }

    .step-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .step-num { font-size: 11px; color: var(--text-dim); letter-spacing: 0.08em; }
    .step-rtag { font-size: 10px; font-weight: 700; letter-spacing: 0.18em; }

    .step-photo {
      width: 100%; aspect-ratio: 4/3; object-fit: cover;
      background: var(--surface); border: 1px solid var(--border); margin-bottom: 14px; display: block;
    }
    .step-photo-ph {
      width: 100%; aspect-ratio: 4/3; background: var(--surface); border: 1px solid var(--border);
      margin-bottom: 14px; display: flex; align-items: center; justify-content: center;
      color: var(--text-dim); font-size: 12px;
    }

    .step-text { font-size: 14px; line-height: 1.75; margin-bottom: 12px; min-height: 52px; }

    .alert-box {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 10px 14px; margin-bottom: 10px; font-size: 12px; line-height: 1.5;
    }
    .alert-box.warn { background: rgba(255,94,94,0.08); border: 1px solid rgba(255,94,94,0.3); color: var(--route-a); }
    .alert-box.note { background: rgba(63,255,168,0.07); border: 1px solid rgba(63,255,168,0.2); color: var(--route-b); }

    .nav-row { display: flex; gap: 10px; margin-top: auto; padding-top: 14px; flex-shrink: 0; }
    .nav-btn {
      flex: 1; background: none; border: 1px solid var(--border); color: var(--text-dim);
      font-family: var(--font); font-size: 12px; padding: 13px; cursor: pointer;
      transition: all 0.15s; letter-spacing: 0.08em;
    }
    .nav-btn:hover { border-color: var(--text); color: var(--text); }
    .nav-btn.primary { border-color: var(--text); color: var(--text); font-weight: 700; }
    .nav-btn:disabled { opacity: 0.25; cursor: not-allowed; }

    /* ── ARRIVAL / GPS ── */
    .gps-ring {
      width: 88px; height: 88px; border-radius: 50%; border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center; margin: 0 auto 18px;
      position: relative; font-size: 30px; transition: border-color 0.3s;
    }
    .gps-ring.checking { border-color: var(--text-dim); animation: pulse 1.6s infinite; }
    .gps-ring.ok { border-color: var(--route-b); }
    .gps-ring.fail { border-color: var(--route-a); }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(123,163,200,0.5); }
      70%  { box-shadow: 0 0 0 18px rgba(123,163,200,0); }
      100% { box-shadow: 0 0 0 0 rgba(123,163,200,0); }
    }
    .scan-line {
      position: absolute; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, var(--route-b), transparent);
      animation: scan 1.8s linear infinite;
    }
    @keyframes scan { 0% { top: 0; } 50% { top: calc(100% - 2px); } 100% { top: 0; } }

    .gps-status { text-align: center; font-size: 13px; color: var(--text-dim); min-height: 20px; }
    .gps-dist { text-align: center; font-size: 11px; color: var(--text-dim); margin-top: 4px; margin-bottom: 24px; min-height: 18px; }

    /* ── UPLOAD ── */
    .upload-area {
      border: 2px dashed var(--border); padding: 28px 20px; text-align: center;
      cursor: pointer; transition: border-color 0.15s; margin-bottom: 12px; position: relative;
    }
    .upload-area:hover { border-color: var(--text-dim); }
    .upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .upload-icon { font-size: 28px; margin-bottom: 6px; }
    .upload-hint { font-size: 12px; color: var(--text-dim); }
    .upload-preview { width: 100%; max-height: 180px; object-fit: cover; border: 1px solid var(--border); margin-bottom: 10px; display: none; }
    .upload-status { font-size: 12px; text-align: center; color: var(--text-dim); margin-bottom: 10px; min-height: 18px; }
    .upload-status.ok { color: var(--route-b); }
    .upload-status.err { color: var(--route-a); }

    /* ── FALLBACK ── */
    .fallback-box {
      background: rgba(255,94,94,0.07); border: 1px solid rgba(255,94,94,0.3);
      padding: 20px; margin-bottom: 12px;
    }
    .fallback-label { font-size: 10px; color: var(--route-a); letter-spacing: 0.15em; text-transform: uppercase; margin-bottom: 10px; }
    .fallback-pw { font-size: 26px; font-weight: 700; letter-spacing: 0.2em; }

    /* ── WAITING ── */
    .float-icon { font-size: 52px; text-align: center; margin: 20px 0; animation: float 2s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }
    .wt-title { font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 8px; }
    .wt-sub { font-size: 12px; color: var(--text-dim); text-align: center; line-height: 1.7; margin-bottom: 28px; }

    /* ── CODE ── */
    .code-input {
      width: 100%; background: var(--surface); border: 2px solid var(--gold); color: var(--gold);
      font-family: var(--font); font-size: 36px; font-weight: 700; padding: 18px;
      text-align: center; outline: none; letter-spacing: 0.35em; margin-bottom: 12px;
      -moz-appearance: textfield;
    }
    .code-input::-webkit-outer-spin-button, .code-input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .code-err { display: none; color: var(--route-a); font-size: 12px; text-align: center; margin-bottom: 10px; }

    /* ── SUCCESS ── */
    .success-icon { font-size: 60px; text-align: center; margin: 24px 0 14px; }
    .success-title { font-size: 30px; font-weight: 700; text-align: center; color: var(--gold); margin-bottom: 8px; }
    .success-sub { font-size: 12px; color: var(--text-dim); text-align: center; line-height: 1.7; margin-bottom: 28px; }
    .intercom-box { background: var(--surface); border: 2px solid var(--gold); padding: 24px; text-align: center; margin-bottom: 20px; }
    .intercom-lbl { font-size: 10px; color: var(--text-dim); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 10px; }
    .intercom-num { font-size: 56px; font-weight: 700; color: var(--gold); letter-spacing: 0.2em; }

    /* ── TIP BOX ── */
    .tip {
      background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--text-dim);
      padding: 11px 14px; font-size: 11px; color: var(--text-dim); line-height: 1.65; margin-bottom: 10px;
    }
    .tip.gold-tip { border-left-color: var(--gold); }

    .mt-auto { margin-top: auto; }
    .divider {
      display: flex; align-items: center; gap: 10px; margin: 12px 0;
      font-size: 10px; color: var(--text-dim); letter-spacing: 0.12em;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  </style>
</head>
<body>
<div id="app">

<!-- ═══ LOGIN ═══ -->
<div class="screen active" id="s-login">
  <div class="header">
    <div class="logo">嘉豪大廈 · HOME GUIDE</div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('yue')">粵</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('chs')">普</button>
    </div>
  </div>
  <div class="section-label" data-k="lbl-visitor"></div>
  <h2 data-k="lbl-addr"></h2>
  <p class="sub" data-k="lbl-addr2"></p>
  <div class="field">
    <input type="password" id="pw" data-placeholder-k="lbl-pw"
           onkeyup="if(event.key==='Enter')doPw()">
  </div>
  <button class="btn" onclick="doPw()"><span data-k="btn-enter"></span></button>
  <div class="mt-auto"><div class="tip" data-k="tip-login"></div></div>
</div>

<!-- ═══ ROUTE SELECT ═══ -->
<div class="screen" id="s-route">
  <div class="header">
    <div class="logo">嘉豪大廈 · HOME GUIDE</div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('yue')">粵</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('chs')">普</button>
    </div>
  </div>
  <div class="section-label" data-k="lbl-choose"></div>
  <p class="sub" data-k="lbl-choose2"></p>

  <!-- C – recommended -->
  <div class="route-card c" onclick="pickRoute('C')">
    <div class="rc-head"><span class="rc-tag c">ROUTE C</span><span class="rc-time">~3 min</span></div>
    <div class="rc-name" data-k="rc-c-name"></div>
    <div class="rc-desc" data-k="rc-c-desc"></div>
    <div class="rc-badge" data-k="badge-rec"></div>
  </div>

  <!-- B -->
  <div class="route-card b" onclick="pickRoute('B')">
    <div class="rc-head"><span class="rc-tag b">ROUTE B</span><span class="rc-time">~4 min</span></div>
    <div class="rc-name" data-k="rc-b-name"></div>
    <div class="rc-desc" data-k="rc-b-desc"></div>
  </div>

  <!-- A -->
  <div class="route-card a" onclick="pickRoute('A')">
    <div class="rc-head"><span class="rc-tag a">ROUTE A</span><span class="rc-time">~8 min</span></div>
    <div class="rc-name" data-k="rc-a-name"></div>
    <div class="rc-desc" data-k="rc-a-desc"></div>
  </div>

  <div class="mt-auto"><div class="tip" data-k="tip-route"></div></div>
</div>

<!-- ═══ STEPS ═══ -->
<div class="screen" id="s-steps">
  <div class="header">
    <button class="back-btn" onclick="go('s-route')">← <span data-k="btn-back"></span></button>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('yue')">粵</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('chs')">普</button>
    </div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pf"></div></div>
  <div class="step-meta">
    <span class="step-num" id="st-num"></span>
    <span class="step-rtag" id="st-tag"></span>
  </div>
  <img class="step-photo" id="st-img" src="" alt=""
       onerror="this.style.display='none';document.getElementById('st-ph').style.display='flex'">
  <div class="step-photo-ph" id="st-ph" style="display:none"><span id="st-ph-txt"></span></div>
  <div class="step-text" id="st-txt"></div>
  <div class="alert-box warn" id="st-warn" style="display:none"></div>
  <div class="alert-box note" id="st-note" style="display:none"></div>
  <div class="nav-row mt-auto">
    <button class="nav-btn" id="btn-prev" onclick="movStep(-1)">← <span data-k="btn-prev"></span></button>
    <button class="nav-btn primary" id="btn-next" onclick="movStep(1)"><span id="next-lbl"></span> →</button>
  </div>
</div>

<!-- ═══ ARRIVAL / GPS ═══ -->
<div class="screen" id="s-arrive">
  <div class="header">
    <button class="back-btn" onclick="go('s-steps')">← <span data-k="btn-back"></span></button>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('yue')">粵</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('chs')">普</button>
    </div>
  </div>
  <div class="section-label" data-k="lbl-verify"></div>
  <h2 data-k="lbl-almost"></h2>
  <p class="sub" data-k="lbl-almost2"></p>

  <div class="gps-ring checking" id="gps-ring">
    <div class="scan-line" id="gps-scan"></div>
    <span id="gps-icon">📡</span>
  </div>
  <div class="gps-status" id="gps-status" data-k="gps-checking"></div>
  <div class="gps-dist" id="gps-dist"></div>

  <!-- upload (GPS ok) -->
  <div id="up-section" style="display:none">
    <div class="section-label" data-k="lbl-upload"></div>
    <p class="sub" style="margin-bottom:12px" data-k="lbl-upload2"></p>
    <img class="upload-preview" id="up-prev">
    <div class="upload-area">
      <input type="file" id="up-file" accept="image/*" capture="user" onchange="onFile(this)">
      <div class="upload-icon">📷</div>
      <div class="upload-hint" data-k="lbl-tap"></div>
    </div>
    <div class="upload-status" id="up-status"></div>
    <button class="btn green" id="btn-send" style="display:none" onclick="sendTG()">
      <span data-k="btn-send"></span>
    </button>
  </div>

  <!-- fallback (GPS fail) -->
  <div id="fb-section" style="display:none">
    <div class="fallback-box">
      <div class="fallback-label" data-k="lbl-fb"></div>
      <div class="fallback-pw">letmein</div>
    </div>
    <p style="font-size:12px;color:var(--text-dim);line-height:1.6" data-k="lbl-fb2"></p>
  </div>
</div>

<!-- ═══ WAITING ═══ -->
<div class="screen" id="s-wait">
  <div class="header">
    <div class="logo">嘉豪大廈 · HOME GUIDE</div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('yue')">粵</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('chs')">普</button>
    </div>
  </div>
  <div class="float-icon">📨</div>
  <div class="wt-title" data-k="wt-title"></div>
  <div class="wt-sub" data-k="wt-sub"></div>
  <div class="tip gold-tip" data-k="wt-tip"></div>
  <button class="btn gold mt-auto" onclick="go('s-code')"><span data-k="btn-hascode"></span></button>
</div>

<!-- ═══ CODE ═══ -->
<div class="screen" id="s-code">
  <div class="header">
    <button class="back-btn" onclick="go('s-wait')">← <span data-k="btn-back"></span></button>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('yue')">粵</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('chs')">普</button>
    </div>
  </div>
  <div class="section-label" data-k="lbl-code"></div>
  <h2 data-k="lbl-code2"></h2>
  <p class="sub" data-k="lbl-code3"></p>
  <input type="number" class="code-input" id="code-in" placeholder="0000" maxlength="4"
         oninput="this.value=this.value.slice(0,4)"
         onkeyup="if(event.key==='Enter')doCode()">
  <div class="code-err" id="code-err" data-k="code-wrong"></div>
  <button class="btn gold" onclick="doCode()"><span data-k="btn-confirm"></span></button>
</div>

<!-- ═══ SUCCESS ═══ -->
<div class="screen" id="s-ok">
  <div class="header">
    <div class="logo">嘉豪大廈 · HOME GUIDE</div>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('yue')">粵</button>
      <button class="lang-btn" onclick="setLang('en')">EN</button>
      <button class="lang-btn" onclick="setLang('chs')">普</button>
    </div>
  </div>
  <div class="success-icon">🎉</div>
  <div class="success-title" data-k="ok-title"></div>
  <div class="success-sub" data-k="ok-sub"></div>
  <div class="intercom-box">
    <div class="intercom-lbl" data-k="ok-lbl"></div>
    <div class="intercom-num">2B</div>
  </div>
  <div class="tip gold-tip" data-k="ok-tip"></div>
</div>

</div><!-- #app -->

/* ─────────────────── STATE ─────────────────── */
let lang = 'yue', route = null, step = 0, file = null;

/* ─────────────────── LANG ─────────────────── */
function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.getAttribute('onclick').includes("'"+l+"'"));
  });
  render();
}
function t(k) { return (T[lang]||T.yue)[k] || k; }
function render() {
  document.querySelectorAll('[data-k]').forEach(el => {
    const v = t(el.getAttribute('data-k'));
    el.innerHTML = v.replace(/\n/g,'<br>');
  });
  const pw = document.getElementById('pw');
  if (pw) pw.placeholder = t('lbl-pw');
  if (route) renderStep();
}

/* ─────────────────── NAVIGATION ─────────────────── */
function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  render();
}

/* ─────────────────── LOGIN ─────────────────── */
function doPw() {
  const v = document.getElementById('pw').value.trim().toLowerCase();
  const inp = document.getElementById('pw');
  if (PASSWORDS.includes(v)) { inp.classList.remove('shake'); go('s-route'); }
  else {
    inp.classList.add('shake');
    setTimeout(()=>inp.classList.remove('shake'),400);
    inp.value='';
  }
}

/* ─────────────────── ROUTE ─────────────────── */
function pickRoute(r) {
  route = r; step = 0;
  renderStep(); go('s-steps');
}

/* ─────────────────── STEPS ─────────────────── */
function renderStep() {
  const R = ROUTES[route], steps = R.steps, s = steps[step], total = steps.length;

  // progress
  const pf = document.getElementById('pf');
  pf.style.width = ((step+1)/total*100)+'%';
  pf.className = 'progress-fill '+R.color;

  // meta
  document.getElementById('st-num').textContent =
    t('step-lbl')+' '+(step+1)+' '+t('of')+' '+total;
  const tag = document.getElementById('st-tag');
  tag.textContent = 'ROUTE '+route;
  tag.style.color = R.cvar;

  // photo
  const img = document.getElementById('st-img');
  const ph  = document.getElementById('st-ph');
  const pht = document.getElementById('st-ph-txt');
  if (s.img) {
    img.src = s.img; img.style.display='block'; ph.style.display='none';
  } else {
    img.style.display='none'; ph.style.display='flex';
    pht.textContent = t('last-step');
  }

  // instruction
  document.getElementById('st-txt').innerHTML = s[lang] || s.yue;

  // warning
  const wb = document.getElementById('st-warn');
  if (s.warn) { wb.style.display='flex'; wb.innerHTML = (s.warn[lang]||s.warn.yue); }
  else wb.style.display='none';

  // note
  const nb = document.getElementById('st-note');
  if (s.note) { nb.style.display='flex'; nb.innerHTML = (s.note[lang]||s.note.yue); }
  else nb.style.display='none';

  // buttons
  const pp = document.getElementById('btn-prev');
  pp.disabled = step===0; pp.style.opacity = step===0?'0.25':'1';

  const nl = document.getElementById('next-lbl');
  const isLast = step===total-1;
  nl.textContent = isLast ? t('arrive') : t('next');
}

function movStep(dir) {
  const steps = ROUTES[route].steps;
  if (dir>0 && step===steps.length-1) { startGPS(); go('s-arrive'); return; }
  step = Math.max(0, Math.min(steps.length-1, step+dir));
  renderStep();
}

/* ─────────────────── GPS ─────────────────── */
function haversine(la1,lo1,la2,lo2) {
  const R=6371000, dLa=(la2-la1)*Math.PI/180, dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function startGPS() {
  const ring = document.getElementById('gps-ring');
  ring.className='gps-ring checking';
  document.getElementById('gps-icon').textContent='📡';
  document.getElementById('gps-scan').style.display='block';
  document.getElementById('gps-status').textContent=t('gps-checking');
  document.getElementById('gps-dist').textContent='';
  document.getElementById('up-section').style.display='none';
  document.getElementById('fb-section').style.display='none';
  file=null;
  document.getElementById('up-prev').style.display='none';
  document.getElementById('btn-send').style.display='none';
  document.getElementById('up-status').textContent='';

  if (!navigator.geolocation) { gpsNo(null); return; }
  navigator.geolocation.getCurrentPosition(
    p => {
      const d = haversine(p.coords.latitude,p.coords.longitude,HOME_LAT,HOME_LNG);
      document.getElementById('gps-dist').textContent = Math.round(d)+' '+t('m-away');
      d<=RADIUS ? gpsYes() : gpsNo(d);
    },
    ()=>gpsNo(null),
    {timeout:12000, maximumAge:0, enableHighAccuracy:true}
  );
}

function gpsYes() {
  const ring=document.getElementById('gps-ring');
  ring.className='gps-ring ok';
  document.getElementById('gps-scan').style.display='none';
  document.getElementById('gps-icon').textContent='✅';
  document.getElementById('gps-status').textContent=t('gps-ok');
  document.getElementById('up-section').style.display='block';
  render();
}

function gpsNo(d) {
  const ring=document.getElementById('gps-ring');
  ring.className='gps-ring fail';
  document.getElementById('gps-scan').style.display='none';
  document.getElementById('gps-icon').textContent='❌';
  document.getElementById('gps-status').textContent=t('gps-fail');
  if(d) document.getElementById('gps-dist').textContent=Math.round(d)+' '+t('m-away');
  document.getElementById('fb-section').style.display='block';
  render();
}

/* ─────────────────── UPLOAD ─────────────────── */
function onFile(inp) {
  if (!inp.files||!inp.files[0]) return;
  file = inp.files[0];
  const prev=document.getElementById('up-prev');
  prev.src=URL.createObjectURL(file); prev.style.display='block';
  document.getElementById('btn-send').style.display='block';
  document.getElementById('up-status').textContent='';
}

async function sendTG() {
  if (!file) return;
  const st=document.getElementById('up-status'), btn=document.getElementById('btn-send');
  st.textContent=t('sending'); st.className='upload-status'; btn.disabled=true;

  const caption = [
    '🏠 嘉豪大廈訪客到達通知',
    'Route: '+route,
    '時間: '+new Date().toLocaleString('zh-HK')
  ].join('\n');

  const fd=new FormData();
  fd.append('chat_id', TG_CHAT);
  fd.append('photo', file, 'visitor.jpg');
  fd.append('caption', caption);

  try {
    const r=await fetch('https://api.telegram.org/bot'+TG_TOKEN+'/sendPhoto',{method:'POST',body:fd});
    const d=await r.json();
    if (d.ok) {
      st.textContent=t('sent-ok'); st.className='upload-status ok';
      setTimeout(()=>go('s-wait'),900);
    } else throw new Error(d.description);
  } catch(e) {
    st.textContent=t('sent-fail'); st.className='upload-status err';
    btn.disabled=false; console.error(e);
  }
}

/* ─────────────────── CODE ─────────────────── */
function doCode() {
  const v=document.getElementById('code-in').value.trim();
  const err=document.getElementById('code-err');
  if (v===CODE) { err.style.display='none'; go('s-ok'); }
  else {
    err.style.display='block';
    const inp=document.getElementById('code-in');
    inp.style.borderColor='var(--route-a)'; inp.style.color='var(--route-a)';
    setTimeout(()=>{ inp.style.borderColor='var(--gold)'; inp.style.color='var(--gold)'; }, 1000);
  }
}

/* ─────────────────── INIT ─────────────────── */
render();
